<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Stickman Runner — City Chase</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family: Arial, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  h1{ margin:10px 0 4px; }
  .hint{ margin:0 0 10px; opacity:.85; font-size:14px; }
  canvas{
    background:#020617;
    border:4px solid #38bdf8;
    box-shadow:0 0 20px #38bdf8;
    border-radius:10px;
    touch-action: manipulation; /* helps touch taps */
  }
</style>
</head>
<body>

<h1>🏃 Stickman Runner — City Chase</h1>
<p class="hint">Tap anywhere on the game to jump</p>
<canvas id="game" width="360" height="220"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// --- Game sizes ---
const W = canvas.width;
const H = canvas.height;
const groundY = 185;

// --- Runner + Police ---
let runner = { x: 95, y: groundY - 40, vy: 0 };
let police = { x: -80 };
let gravity = 1.15;
let frame = 0;

// --- Difficulty ---
let baseSpeed = 3.8;       // affects scrolling speed
let chaseSpeed = 0.35;     // police catch-up speed
let score = 0;

// --- City background (parallax layers) ---
let farX = 0;
let nearX = 0;
const farBuildings = makeBuildings(12, 18, 45);   // far layer
const nearBuildings = makeBuildings(10, 35, 85);  // near layer

// Road lane lines
let laneX = 0;

function rand(min, max){
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function makeBuildings(count, minH, maxH){
  // buildings use width + height; y is based on ground
  const arr = [];
  let x = 0;
  for(let i=0;i<count;i++){
    const w = rand(22, 48);
    const h = rand(minH, maxH);
    arr.push({ x, w, h, winSeed: rand(0, 9999) });
    x += w + rand(8, 18);
  }
  return arr;
}

function recycleBuildings(arr, speed){
  // move and recycle offscreen buildings
  for(const b of arr){
    b.x -= speed;
  }
  // if first is offscreen, move it to the end
  while(arr.length && arr[0].x + arr[0].w < -80){
    const first = arr.shift();
    const last = arr[arr.length - 1];
    first.x = last.x + last.w + rand(10, 22);
    first.w = rand(22, 50);
    first.h = rand( (arr === farBuildings) ? 18 : 35, (arr === farBuildings) ? 45 : 85 );
    first.winSeed = rand(0, 9999);
    arr.push(first);
  }
}

function drawSkyGradient(){
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, "#0b1224");
  g.addColorStop(0.55, "#0f172a");
  g.addColorStop(1, "#050914");
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);
}

function drawMoon(){
  ctx.fillStyle = "rgba(255,255,255,0.10)";
  ctx.beginPath();
  ctx.arc(W-50, 45, 18, 0, Math.PI*2);
  ctx.fill();
}

function drawBuildings(arr, baseY, colour, windowColour, windowChance){
  ctx.fillStyle = colour;
  for(const b of arr){
    const x = b.x;
    const y = baseY - b.h;
    ctx.fillRect(x, y, b.w, b.h);

    // windows (simple dots/rectangles)
    // deterministic-ish using winSeed + frame so it flickers slightly
    let seed = b.winSeed + Math.floor(frame/20);
    function seededRand(){
      seed = (seed * 9301 + 49297) % 233280;
      return seed / 233280;
    }

    ctx.fillStyle = windowColour;
    for(let wy = y + 6; wy < baseY - 6; wy += 10){
      for(let wx = x + 6; wx < x + b.w - 6; wx += 10){
        if(seededRand() < windowChance){
          ctx.fillRect(wx, wy, 4, 6);
        }
      }
    }
    ctx.fillStyle = colour;
  }
}

function drawRoad(){
  // road slab
  ctx.fillStyle = "#0b1020";
  ctx.fillRect(0, groundY, W, H - groundY);

  // road top line glow
  ctx.strokeStyle = "rgba(34,197,94,0.85)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(W, groundY);
  ctx.stroke();

  // lane lines moving
  laneX -= baseSpeed;
  if(laneX < -40) laneX = 0;

  ctx.strokeStyle = "rgba(255,255,255,0.25)";
  ctx.lineWidth = 3;
  for(let x = laneX; x < W; x += 60){
    ctx.beginPath();
    ctx.moveTo(x, groundY + 18);
    ctx.lineTo(x + 30, groundY + 18);
    ctx.stroke();
  }
}

function drawRunner(x, y){
  ctx.strokeStyle = "white";
  ctx.lineWidth = 3;

  // head
  ctx.beginPath();
  ctx.arc(x, y - 30, 6, 0, Math.PI*2);
  ctx.stroke();

  // body (lean forward)
  ctx.beginPath();
  ctx.moveTo(x, y - 24);
  ctx.lineTo(x + 2, y - 6);
  ctx.stroke();

  // legs (running)
  const legSwing = Math.sin(frame * 0.25) * 5;
  ctx.beginPath();
  ctx.moveTo(x + 2, y - 6);
  ctx.lineTo(x - 8, y + 10 + legSwing);
  ctx.moveTo(x + 2, y - 6);
  ctx.lineTo(x + 10, y + 10 - legSwing);
  ctx.stroke();

  // arms
  const armSwing = Math.sin(frame * 0.25 + Math.PI) * 4;
  ctx.beginPath();
  ctx.moveTo(x, y - 18);
  ctx.lineTo(x - 10, y - 12 + armSwing);
  ctx.moveTo(x, y - 18);
  ctx.lineTo(x + 10, y - 14 - armSwing);
  ctx.stroke();
}

function drawPolice(x){
  const y = groundY - 40;

  // police outline (blue)
  ctx.strokeStyle = "#3b82f6";
  ctx.lineWidth = 3;

  ctx.beginPath();
  ctx.arc(x, y - 30, 6, 0, Math.PI*2);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x, y - 24);
  ctx.lineTo(x, y - 6);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x, y - 6);
  ctx.lineTo(x - 6, y + 10);
  ctx.moveTo(x, y - 6);
  ctx.lineTo(x + 6, y + 10);
  ctx.stroke();

  // flashing siren lights
  const flash = (frame % 20) < 10;
  ctx.fillStyle = flash ? "red" : "deepskyblue";
  ctx.fillRect(x - 10, y - 44, 7, 4);
  ctx.fillRect(x + 3,  y - 44, 7, 4);
}

function resetGame(){
  runner.y = groundY - 40;
  runner.vy = 0;
  police.x = -80;
  score = 0;
  baseSpeed = 3.8;
  chaseSpeed = 0.35;
}

function update(){
  frame++;
  ctx.clearRect(0,0,W,H);

  // make scrolling slightly faster over time
  if(frame % 60 === 0){
    score++;
    baseSpeed += 0.03;
    chaseSpeed += 0.01;
  }

  // --- Background ---
  drawSkyGradient();
  drawMoon();

  // Parallax scroll: far moves slower than near
  recycleBuildings(farBuildings, baseSpeed * 0.25);
  recycleBuildings(nearBuildings, baseSpeed * 0.55);

  drawBuildings(farBuildings, groundY - 25, "rgba(15,23,42,0.9)", "rgba(255,236,160,0.35)", 0.35);
  drawBuildings(nearBuildings, groundY - 10, "rgba(30,41,59,0.95)", "rgba(255,236,160,0.55)", 0.45);

  // --- Road ---
  drawRoad();

  // --- Physics ---
  runner.y += runner.vy;
  runner.vy += gravity;

  if(runner.y > groundY - 40){
    runner.y = groundY - 40;
    runner.vy = 0;
  }

  // Police moves closer
  police.x += chaseSpeed;

  // Draw characters
  drawRunner(runner.x, runner.y);
  drawPolice(police.x);

  // If caught
  if(police.x > runner.x - 6){
    alert("🚓 Caught! Survival score: " + score);
    resetGame();
  }

  // UI text
  ctx.fillStyle = "rgba(255,255,255,0.9)";
  ctx.font = "14px Arial";
  ctx.fillText("Survival Score: " + score, 10, 20);
}

function jump(){
  // jump only if on ground
  if(runner.y >= groundY - 40){
    runner.vy = -15;
  }
}

// Touch + click
canvas.addEventListener("click", jump);
canvas.addEventListener("touchstart", (e) => { e.preventDefault(); jump(); }, { passive:false });

// Start game loop
setInterval(update, 30);
</script>

</body>
</html>
