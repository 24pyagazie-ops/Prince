<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Prince Game Zone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: centre;
    }
    header {
      background: #020617;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }
    .games {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .game {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .game:hover {
      transform: scale(1.05);
      background: #334155;
    }
    footer {
      padding: 10px;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<header>🎮 Prince Game Zone</header>

<p>Click a game to play</p>
>


<footer>Made with ❤️ on GitHub Pages</footer>
<hr style="border:0;height:1px;background:rgba(255,255,255,0.15);margin:16px 0;">

<div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;padding:10px;">
  <button onclick="loadGame('snake.html')">🐍 Snake</button>
  <button onclick="loadGame('stickman.html')">🏃 Stickman</button>
  <button onclick="loadGame('metro.html')">🚇 Metro Runner</button>
</div>

<div style="width:min(900px,95vw);margin:0 auto;padding:10px;">
  <iframe id="gameFrame"
    src="snake.html"
    style="width:100%;height:70vh;border:3px solid #38bdf8;border-radius:12px;background:#000;"
    
  ></iframe>
</div>

<script>
  function loadGame(page){
    document.getElementById("gameFrame").src = page;
    window.scrollTo({ 
      top: document.body.scrollHeight, 
      behavior: "smooth" });
  }
</script>

<style>
  button{
<script>  function loadGame(page){    
  document.getElementById("gameFrame").src = page;    window.scrollTo({      top: document.getElementById("gameFrame").offsetTop,      behavior: "smooth"    });  }</script
</body>
</html>
